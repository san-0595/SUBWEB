<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/jquery@3.6.4/dist/jquery.min.js"></script>
    <script src="./qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Lfree订阅转换 - 现代化的代理订阅转换工具</title>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-black min-h-screen">
    <!-- Background Pattern -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-50/20 via-white to-purple-50/20 dark:from-blue-950/30 dark:via-gray-900 dark:to-purple-950/30"></div>
        <div class="absolute inset-0 opacity-30 dark:opacity-20">
            <div class="absolute top-0 left-0 w-96 h-96 bg-blue-300 dark:bg-blue-800 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-pulse"></div>
            <div class="absolute top-0 right-0 w-96 h-96 bg-purple-300 dark:bg-purple-800 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-pulse animation-delay-2000"></div>
            <div class="absolute bottom-0 left-1/2 w-96 h-96 bg-pink-300 dark:bg-pink-800 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-pulse animation-delay-4000"></div>
        </div>
    </div>

  
    <!-- Header -->
    <header class="relative z-20 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md shadow-sm border-b border-gray-200/50 dark:border-gray-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-br from-blue-500 to-purple-600 p-2 rounded-xl shadow-lg">
                        <i class="fas fa-exchange-alt text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold bg-gradient-to-r from-gray-900 to-gray-600 dark:from-gray-100 dark:to-gray-300 bg-clip-text text-transparent">
                            Lfree订阅转换
                        </h1>
                        <p class="mt-0.5 text-xs text-gray-600 dark:text-gray-400">现代化代理订阅转换工具</p>
                    </div>
                </div>
                <!-- Theme Switcher -->
                <div class="flex items-center space-x-3">
                    <div class="relative">
                        <button id="themeToggle" type="button" 
                            class="flex items-center px-3 py-1.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg transition-colors text-sm">
                            <i id="themeIcon" class="fas fa-moon mr-2 text-sm"></i>
                            <span id="themeText">深色</span>
                        </button>
                        <div id="themeDropdown" class="hidden absolute right-0 mt-2 w-36 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 z-50">
                            <div class="py-2">
                                <button type="button" data-theme="light" class="flex items-center w-full px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-sun mr-2"></i>
                                    浅色模式
                                </button>
                                <button type="button" data-theme="dark" class="flex items-center w-full px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-moon mr-2"></i>
                                    深色模式
                                </button>
                                <button type="button" data-theme="system" class="flex items-center w-full px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-desktop mr-2"></i>
                                    跟随系统
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Backend Selector Dropdown -->
                <div class="relative">
                    <button id="backendToggle" type="button" 
                        class="flex items-center px-3 py-1.5 bg-orange-100 hover:bg-orange-200 dark:bg-orange-900 dark:hover:bg-orange-800 text-orange-700 dark:text-orange-200 rounded-lg transition-colors text-sm">
                        <i class="fas fa-server mr-2 text-sm"></i>
                        <span id="selectedBackendName">选择后端</span>
                        <i class="fas fa-chevron-down ml-2 text-xs"></i>
                    </button>
                    <div id="backendDropdown" class="hidden absolute right-0 mt-2 w-80 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-600 z-50">
                        <div class="p-4">
                            <div class="flex items-center justify-between mb-3">
                                <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-200">后端服务</h3>
                                <button type="button" id="refreshBackendsHeader" 
                                    class="px-2 py-1 text-xs bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-200 rounded hover:bg-orange-200 dark:hover:bg-orange-800 transition-colors">
                                    <i class="fas fa-sync-alt mr-1"></i>
                                    刷新
                                </button>
                            </div>
                            <div class="select-enhanced">
                                <select id="backendHeader" name="backend" required
                                    class="w-full px-3 py-2 pr-10 border-2 border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm transition-all duration-200 appearance-none cursor-pointer hover:border-gray-300 dark:hover:border-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500">
                                </select>
                            </div>
                            <!-- Custom Backend Input -->
                            <div id="customBackendContainerHeader" class="mt-3 hidden">
                                <input type="text" id="customBackendHeader" name="customBackend"
                                    placeholder="输入自定义后端地址"
                                    class="w-full px-3 py-2 border-2 border-orange-200 dark:border-orange-700 rounded-lg bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <form id="optionsForm" class="space-y-4">
            <!-- Original Subscription URL with embedded Target Client -->
            <div class="group animate-slide-up">
                <div class="card-glass">
                    <div class="card-body">
                        <!-- Top row with both labels and client selector -->
                        <div class="flex items-center mb-4 space-x-6">
                            <!-- URL label (leftmost) -->
                            <div class="flex items-center">
                                <div class="bg-blue-100 dark:bg-blue-900/70 p-2 rounded-lg mr-3">
                                    <i class="fas fa-link text-blue-600 dark:text-blue-400"></i>
                                </div>
                                <label for="url" class="form-label mb-0">
                                    原订阅链接 <span class="text-red-500">*</span>
                                </label>
                            </div>
                            
                            <!-- Target Client (right of URL label) -->
                            <div class="flex items-center">
                                <div class="bg-purple-100 dark:bg-purple-900/70 p-2 rounded-lg mr-3">
                                    <i class="fas fa-bullseye text-purple-600 dark:text-purple-400"></i>
                                </div>
                                <div class="flex items-center">
                                    <label for="target" class="form-label mb-0 mr-3">
                                        客户端类型 <span class="text-red-500">*</span>
                                    </label>
                                    <div class="select-enhanced min-w-[200px]">
                                        <select id="target" name="target" required
                                            class="px-3 py-2 pr-8 border-2 border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm transition-all duration-200 appearance-none cursor-pointer hover:border-gray-300 dark:hover:border-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- URL textarea -->
                        <textarea id="url" name="url" required
                            placeholder="支持订阅或ss/ssr/vmess链接，多个链接每行一个或用 | 分隔"
                            class="w-full px-4 py-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 resize-none hover:bg-gray-100 dark:hover:bg-gray-700 focus:bg-white dark:focus:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                            rows="4"></textarea>
                    </div>
                </div>
            </div>


            <!-- Config and Filter Options -->
            <div class="group animate-slide-up">
                <div class="card-glass">
                    <div class="card-body">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center">
                                <div class="bg-green-100 dark:bg-green-900 p-3 rounded-xl mr-4 floating">
                                    <i class="fas fa-cog text-green-600 dark:text-green-400 text-xl"></i>
                                </div>
                                <h3 class="text-xl font-bold gradient-text">配置与过滤</h3>
                            </div>
                            <!-- Advanced Options Checkboxes -->
                            <div class="flex items-center space-x-3">
                                <span class="text-sm text-gray-600 dark:text-gray-400 mr-2">高级选项:</span>
                                <div class="flex flex-wrap gap-2">
                                    <label class="flex items-center text-xs bg-blue-50 hover:bg-blue-100 dark:bg-blue-900/70 dark:hover:bg-blue-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="启用Emoji">
                                        <input type="checkbox" id="emoji" name="emoji" checked class="mr-1 h-3 w-3">
                                        <i class="fas fa-smile text-yellow-500 dark:text-yellow-400 mr-1 text-xs"></i>Emoji
                                    </label>
                                    <label class="flex items-center text-xs bg-purple-50 hover:bg-purple-100 dark:bg-purple-900/70 dark:hover:bg-purple-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="显示节点类型">
                                        <input type="checkbox" id="append_type" name="append_type" checked class="mr-1 h-3 w-3">
                                        <i class="fas fa-tag text-purple-500 dark:text-purple-400 mr-1 text-xs"></i>节点类型
                                    </label>
                                    <label class="flex items-center text-xs bg-green-50 hover:bg-green-100 dark:bg-green-900/70 dark:hover:bg-green-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="包含信息节点">
                                        <input type="checkbox" id="append_info" name="append_info" checked class="mr-1 h-3 w-3">
                                        <i class="fas fa-info-circle text-green-500 dark:text-green-400 mr-1 text-xs"></i>信息节点
                                    </label>
                                    <label class="flex items-center text-xs bg-orange-50 hover:bg-orange-100 dark:bg-orange-900/70 dark:hover:bg-orange-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="跳过TLS验证">
                                        <input type="checkbox" id="scv" name="scv" class="mr-1 h-3 w-3">
                                        <i class="fas fa-shield-alt text-orange-500 dark:text-orange-400 mr-1 text-xs"></i>跳过TLS
                                    </label>
                                    <label class="flex items-center text-xs bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-900/70 dark:hover:bg-indigo-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="启用UDP">
                                        <input type="checkbox" id="udp" name="udp" class="mr-1 h-3 w-3">
                                        <i class="fas fa-broadcast-tower text-indigo-500 dark:text-indigo-400 mr-1 text-xs"></i>UDP
                                    </label>
                                    <label class="flex items-center text-xs bg-pink-50 hover:bg-pink-100 dark:bg-pink-900/70 dark:hover:bg-pink-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="Node List">
                                        <input type="checkbox" id="list" name="list" class="mr-1 h-3 w-3">
                                        <i class="fas fa-list text-pink-500 dark:text-pink-400 mr-1 text-xs"></i>List
                                    </label>
                                    <label class="flex items-center text-xs bg-teal-50 hover:bg-teal-100 dark:bg-teal-900/70 dark:hover:bg-teal-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="节点二次排序">
                                        <input type="checkbox" id="sort" name="sort" class="mr-1 h-3 w-3">
                                        <i class="fas fa-sort text-teal-500 dark:text-teal-400 mr-1 text-xs"></i>排序
                                    </label>
                                    <label class="flex items-center text-xs bg-red-50 hover:bg-red-100 dark:bg-red-900/70 dark:hover:bg-red-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="过滤非法节点">
                                        <input type="checkbox" id="fdn" name="fdn" class="mr-1 h-3 w-3">
                                        <i class="fas fa-ban text-red-500 dark:text-red-400 mr-1 text-xs"></i>过滤
                                    </label>
                                    <label class="flex items-center text-xs bg-cyan-50 hover:bg-cyan-100 dark:bg-cyan-900/70 dark:hover:bg-cyan-800/80 text-gray-700 dark:text-gray-200 px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="插入insert_url">
                                        <input type="checkbox" id="insert" name="insert" class="mr-1 h-3 w-3">
                                        <i class="fas fa-plus-square text-cyan-500 dark:text-cyan-400 mr-1 text-xs"></i>Insert
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <label for="config" class="form-label flex items-center mb-3">
                                <i class="fas fa-cog text-green-500 dark:text-green-400 mr-2"></i>
                                外部配置规则
                            </label>
                            <div class="select-enhanced">
                                <select id="config" name="config"
                                    class="w-full px-4 py-3 pr-12 border-2 border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-medium transition-all duration-200 appearance-none cursor-pointer hover:border-gray-300 dark:hover:border-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 focus:bg-gray-50 dark:focus:bg-gray-700">
                                </select>
                            </div>
                        </div>
                        
                        <!-- Filter Options -->
                        <div class="pt-4">
                            <h4 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-3">节点过滤</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                <div class="space-y-1">
                                    <label for="include" class="form-label flex items-center">
                                        <i class="fas fa-plus-circle text-green-500 dark:text-green-400 mr-2"></i>
                                        包含关键字
                                    </label>
                                    <input type="text" id="include" name="include"
                                        placeholder="节点名包含的关键字，支持正则"
                                        class="input-field hover:bg-gray-100 focus:bg-white">
                                </div>
                                <div class="space-y-1">
                                    <label for="exclude" class="form-label flex items-center">
                                        <i class="fas fa-minus-circle text-red-500 mr-2"></i>
                                        排除关键字
                                    </label>
                                    <input type="text" id="exclude" name="exclude"
                                        placeholder="节点名不包含的关键字，支持正则"
                                        class="input-field hover:bg-gray-100 focus:bg-white">
                                </div>
                                <div class="space-y-1">
                                    <label for="name" class="form-label flex items-center">
                                        <i class="fas fa-file-signature text-blue-500 mr-2"></i>
                                        转换文件名
                                    </label>
                                    <input type="text" id="name" name="name"
                                        placeholder="链接返回的订阅文件名"
                                        class="input-field hover:bg-gray-100 focus:bg-white">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-6 justify-center animate-slide-up" style="animation-delay: 0.3s">
                <button type="submit" id="generateBtn"
                    class="btn-primary px-8 py-4 text-lg font-semibold pulse-glow">
                    <i class="fas fa-magic mr-3 text-xl"></i>
                    生成新订阅链接
                </button>
                <div class="flex gap-3">
                    <button type="button" id="importToClash"
                        class="btn-secondary px-8 py-4 text-lg font-semibold">
                        <i class="fas fa-download mr-3 text-xl"></i>
                        一键导入Clash
                    </button>
                    <button type="button" id="clashQrBtn"
                        class="btn-secondary px-4 py-4 text-lg font-semibold">
                        <i class="fas fa-qrcode text-xl"></i>
                    </button>
                </div>
            </div>
        </form>

        <!-- Result Section -->
        <div id="resultSection" class="mt-8 opacity-0 transform translate-y-4 transition-all duration-300 animate-scale-in" style="display: none;">
            <div class="card-glass border-green-200/50">
                <div class="card-body">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center">
                            <div class="bg-green-100 p-3 rounded-xl mr-4">
                                <i class="fas fa-check-circle text-green-600 text-xl"></i>
                            </div>
                            <h3 class="text-xl font-bold gradient-text">转换完成</h3>
                            <span class="badge badge-primary ml-3">成功</span>
                        </div>
                        <div class="flex gap-3">
                            <button id="qrBtn" type="button"
                                class="btn-secondary">
                                <i class="fas fa-qrcode mr-2"></i>
                                生成二维码
                            </button>
                            <button id="copyBtn" type="button"
                                class="btn-primary">
                                <i class="fas fa-copy mr-2"></i>
                                复制链接
                            </button>
                        </div>
                    </div>
                    <div class="relative">
                        <textarea id="result" readonly
                            placeholder="新的订阅链接将显示在这里"
                            class="w-full px-4 py-3 bg-gray-50 border-2 border-green-200 rounded-xl text-gray-700 font-mono text-sm resize-none focus:outline-none focus:ring-2 focus:ring-green-500"
                            rows="4"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 transform translate-x-full transition-transform duration-300 ease-in-out z-50 hidden">
        <div class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl p-4 flex items-center space-x-4 border border-gray-200/50">
            <div id="toastIcon" class="flex-shrink-0 w-6 h-6 flex items-center justify-center"></div>
            <div class="flex-grow">
                <p id="toastMessage" class="text-sm font-semibold text-gray-900"></p>
            </div>
            <button onclick="hideToast()" class="flex-shrink-0 text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white/90 backdrop-blur-xl rounded-3xl p-8 flex flex-col items-center space-y-6 shadow-2xl animate-scale-in">
            <div class="relative">
                <div class="animate-spin rounded-full h-16 w-16 border-4 border-primary-200 border-t-primary-600"></div>
                <div class="absolute inset-0 rounded-full h-16 w-16 border-4 border-primary-600 border-t-transparent animate-spin" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
            </div>
            <p class="text-gray-700 font-semibold text-lg">正在生成订阅链接...</p>
            <div class="flex space-x-1">
                <div class="w-2 h-2 bg-primary-600 rounded-full animate-bounce" style="animation-delay: 0s;"></div>
                <div class="w-2 h-2 bg-primary-600 rounded-full animate-bounce" style="animation-delay: 0.1s;"></div>
                <div class="w-2 h-2 bg-primary-600 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qrModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="bg-white/95 backdrop-blur-xl rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl animate-scale-in">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-800">订阅链接二维码</h3>
                <button id="closeQrModal" class="text-gray-500 hover:text-gray-700 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-white p-4 rounded-2xl shadow-inner mb-4">
                    <div id="qrCodeCanvas"></div>
                </div>
                <p class="text-sm text-gray-600 text-center">
                    请使用手机扫描二维码导入订阅链接
                </p>
            </div>
        </div>
    </div>

    <style>
        /* Custom animations */
        .animation-delay-2000 {
            animation-delay: 1.2s;
        }
        .animation-delay-4000 {
            animation-delay: 2.4s;
        }

        /* Hover effects */
        .group:hover .group-hover\:scale-110 {
            transform: scale(1.1);
        }

        /* Focus styles */
        input:focus, select:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Bounce animation */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .animate-bounce {
            animation: bounce 0.8s ease-in-out infinite;
        }

        /* Gradient text animation */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient 2s ease infinite;
        }

        /* Checkbox custom styles */
        input[type="checkbox"] {
            @apply h-5 w-5 rounded border-gray-300 text-primary-600 focus:ring-primary-500 transition-colors;
        }

        input[type="checkbox"]:checked {
            @apply bg-primary-600 border-primary-600;
        }

        /* Scroll animations */
        .scroll-animate {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
        }

        .scroll-animate.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Glass effect enhancement */
        .glass-enhance {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Hover lift effect */
        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Fade in animation for custom backend */
        .animate-fade-in {
            animation: fadeIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Smooth transition for hiding */
        #customBackendContainer {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #customBackendContainer.hidden {
            opacity: 0;
            transform: translateY(-8px) scale(0.98);
            pointer-events: none;
        }

        /* Pulse animation for custom backend container */
        #customBackendContainer:not(.hidden) {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.1);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(251, 146, 60, 0);
            }
        }

        /* Input field glow effect */
        #customBackend:focus {
            box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.1), 0 0 20px rgba(251, 146, 60, 0.1);
        }

        /* Custom tooltip styles */
        .tooltip-container {
            position: relative;
        }

        .tooltip-container::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            z-index: 1000;
            margin-bottom: 5px;
        }

        .tooltip-container::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.9);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            margin-bottom: 1px;
        }

        .tooltip-container:hover::after,
        .tooltip-container:hover::before {
            opacity: 1;
            visibility: visible;
        }
    </style>

    <script>
        // Hide toast function
        function hideToast() {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.classList.add('translate-x-full');
            }
        }
    </script>
</body>

</html>
