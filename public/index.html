<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/jquery@3.6.4/dist/jquery.min.js"></script>
    <script src="./qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>在线订阅转换 - 现代化的代理订阅转换工具</title>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-black min-h-screen">
    <!-- Background Pattern - 简化移动端动画 -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-50/20 via-white to-purple-50/20 dark:from-blue-950/30 dark:via-gray-900 dark:to-purple-950/30"></div>
        <div class="absolute inset-0 opacity-20 dark:opacity-10 hidden sm:block">
            <div class="absolute top-0 left-0 w-96 h-96 bg-blue-300 dark:bg-blue-800 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-pulse"></div>
            <div class="absolute top-0 right-0 w-96 h-96 bg-purple-300 dark:bg-purple-800 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-pulse animation-delay-2000"></div>
            <div class="absolute bottom-0 left-1/2 w-96 h-96 bg-pink-300 dark:bg-pink-800 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl animate-pulse animation-delay-4000"></div>
        </div>
    </div>

  
    <!-- Header - 简化移动端 backdrop-blur -->
    <header class="relative z-20 bg-white/95 dark:bg-gray-900/95 backdrop-blur-sm sm:backdrop-blur-md shadow-sm border-b border-gray-200/50 dark:border-gray-700/50">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-2 sm:py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2 sm:space-x-3 min-w-0 flex-1">
                    <div class="bg-gradient-to-br from-blue-500 to-purple-600 w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl shadow-lg flex-shrink-0 flex items-center justify-center">
                        <i class="fas fa-exchange-alt text-white text-sm sm:text-lg"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                        <h1 class="text-base sm:text-xl font-bold bg-gradient-to-r from-gray-900 to-gray-600 dark:from-gray-100 dark:to-gray-300 bg-clip-text text-transparent truncate">
                            在线订阅转换
                        </h1>
                        <p class="mt-0.5 text-xs text-gray-600 dark:text-gray-400 hidden sm:block">现代化代理订阅转换工具</p>
                    </div>
                </div>
                <!-- Theme Switcher and Backend Selector -->
                <div class="flex items-center space-x-1 sm:space-x-3 flex-shrink-0">
                    <div class="relative">
                        <button id="themeToggle" type="button" 
                            class="flex items-center px-2 sm:px-3 py-1 sm:py-1.5 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg transition-colors text-xs sm:text-sm">
                            <i id="themeIcon" class="fas fa-moon text-xs sm:text-sm sm:mr-2"></i>
                            <span id="themeText" class="hidden sm:inline">深色</span>
                        </button>
                        <div id="themeDropdown" class="hidden absolute right-0 mt-2 w-32 sm:w-36 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 z-50">
                            <div class="py-2">
                                <button type="button" data-theme="light" class="flex items-center w-full px-3 sm:px-4 py-2 text-xs sm:text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-sun mr-2"></i>
                                    <span class="hidden sm:inline">浅色模式</span>
                                    <span class="sm:hidden">浅色</span>
                                </button>
                                <button type="button" data-theme="dark" class="flex items-center w-full px-3 sm:px-4 py-2 text-xs sm:text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-moon mr-2"></i>
                                    <span class="hidden sm:inline">深色模式</span>
                                    <span class="sm:hidden">深色</span>
                                </button>
                                <button type="button" data-theme="system" class="flex items-center w-full px-3 sm:px-4 py-2 text-xs sm:text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-desktop mr-2"></i>
                                    <span class="hidden sm:inline">跟随系统</span>
                                    <span class="sm:hidden">系统</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Backend Selector Dropdown -->
                <div class="relative">
                    <button id="backendToggle" type="button" 
                        class="flex items-center px-2 sm:px-3 py-1 sm:py-1.5 bg-orange-100 hover:bg-orange-200 dark:bg-orange-900 dark:hover:bg-orange-800 text-orange-700 dark:text-orange-200 rounded-lg transition-colors text-xs sm:text-sm">
                        <i class="fas fa-server text-xs sm:text-sm sm:mr-2"></i>
                        <span id="selectedBackendName" class="hidden sm:inline truncate max-w-20 sm:max-w-none">选择后端</span>
                        <i class="fas fa-chevron-down ml-1 sm:ml-2 text-xs"></i>
                    </button>
                    <div id="backendDropdown" class="hidden absolute right-0 mt-2 w-72 sm:w-80 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-600 z-50">
                        <div class="p-3 sm:p-4">
                            <div class="flex items-center justify-between mb-3">
                                <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-200">后端服务</h3>
                                <button type="button" id="refreshBackendsHeader" 
                                    class="px-2 py-1 text-xs bg-orange-100 text-orange-700 dark:bg-orange-900 dark:text-orange-200 rounded hover:bg-orange-200 dark:hover:bg-orange-800 transition-colors">
                                    <i class="fas fa-sync-alt mr-1"></i>
                                    刷新
                                </button>
                            </div>
                            <div class="select-enhanced">
                                <select id="backendHeader" name="backend" required
                                    class="w-full px-3 py-2 pr-10 border-2 border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-xs sm:text-sm transition-all duration-200 appearance-none cursor-pointer hover:border-gray-300 dark:hover:border-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500">
                                </select>
                            </div>
                            <!-- Custom Backend Input -->
                            <div id="customBackendContainerHeader" class="mt-3 hidden">
                                <input type="text" id="customBackendHeader" name="customBackend"
                                    placeholder="输入自定义后端地址"
                                    class="w-full px-3 py-2 border-2 border-orange-200 dark:border-orange-700 rounded-lg bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-4 sm:py-8 pb-24 sm:pb-8">
        <form id="optionsForm" class="space-y-3 sm:space-y-4">
            <!-- Original Subscription URL with embedded Target Client -->
            <div class="group animate-slide-up">
                <div class="card-glass">
                    <div class="card-body">
                        <!-- Top row with both labels and client selector -->
                        <div class="flex flex-col space-y-3 sm:flex-row sm:items-center mb-4 sm:space-y-0 sm:space-x-6">
                            <!-- URL label and client selector in one row on mobile -->
                            <div class="flex items-center justify-between sm:justify-start space-x-4 sm:space-x-6 flex-1">
                                <!-- URL label -->
                                <div class="flex items-center flex-shrink-0">
                                    <div class="bg-blue-100 dark:bg-blue-900/70 p-2 rounded-lg mr-3">
                                        <i class="fas fa-link text-blue-600 dark:text-blue-400"></i>
                                    </div>
                                    <label for="url" class="form-label mb-0 whitespace-nowrap">
                                        原订阅链接 <span class="text-red-500">*</span>
                                    </label>
                                </div>
                                
                                <!-- Target Client selector - same row on mobile -->
                                <div class="flex items-center min-w-0 flex-1 sm:flex-initial">
                                    <div class="bg-purple-100 dark:bg-purple-900/70 p-2 rounded-lg mr-3 hidden sm:block">
                                        <i class="fas fa-bullseye text-purple-600 dark:text-purple-400"></i>
                                    </div>
                                    <div class="flex items-center w-full sm:w-auto">
                                        <label for="target" class="form-label mb-0 mr-3 whitespace-nowrap hidden sm:inline">
                                            客户端类型 <span class="text-red-500">*</span>
                                        </label>
                                        <div class="select-enhanced min-w-0 flex-1 sm:min-w-[200px] sm:flex-none">
                                            <select id="target" name="target" required
                                                class="w-full px-3 py-2 pr-8 border-2 border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm transition-all duration-200 appearance-none cursor-pointer hover:border-gray-300 dark:hover:border-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- URL textarea -->
                        <textarea id="url" name="url" required
                            placeholder="支持订阅或ss/ssr/vmess链接，多个链接每行一个或用 | 分隔"
                            class="w-full px-3 sm:px-4 py-2 sm:py-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 resize-none hover:bg-gray-100 dark:hover:bg-gray-700 focus:bg-white dark:focus:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 text-sm sm:text-base"
                            rows="3 sm:rows-4"></textarea>
                    </div>
                </div>
            </div>


            <!-- Config and Filter Options -->
            <div class="group animate-slide-up">
                <div class="card-glass">
                    <div class="card-body">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 space-y-4 sm:space-y-0">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="bg-green-100 dark:bg-green-900 p-3 rounded-xl mr-4 floating">
                                        <i class="fas fa-cog text-green-600 dark:text-green-400 text-xl"></i>
                                    </div>
                                    <h3 class="text-lg sm:text-xl font-bold gradient-text">配置与过滤</h3>
                                </div>
                                
                                <!-- Mobile Advanced Options Toggle Button - same line as title -->
                                <div class="flex sm:hidden">
                                    <button type="button" id="mobileAdvancedToggle" 
                                        class="flex items-center px-3 py-2 bg-blue-100 hover:bg-blue-200 dark:bg-blue-900 dark:hover:bg-blue-800 text-blue-700 dark:text-blue-200 rounded-lg transition-colors text-sm">
                                        <i class="fas fa-sliders-h mr-2 text-sm"></i>
                                        <span id="advancedToggleText">高级选项</span>
                                        <i class="fas fa-chevron-down ml-2 text-xs transition-transform" id="advancedToggleIcon"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- Advanced Options - Desktop version (unchanged) -->
                            <div class="hidden sm:flex sm:flex-row sm:items-center space-y-2 sm:space-y-0 sm:space-x-3">
                                <span class="text-xs sm:text-sm text-gray-600 dark:text-gray-400 sm:mr-2">高级选项:</span>
                                <div class="grid grid-cols-3 sm:flex sm:flex-wrap gap-1 sm:gap-2">
                                    <label class="flex items-center text-xs bg-blue-50 hover:bg-blue-100 dark:bg-blue-900/70 dark:hover:bg-blue-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="启用Emoji">
                                        <input type="checkbox" id="emoji" name="emoji" checked class="mr-1 h-3 w-3">
                                        <i class="fas fa-smile text-yellow-500 dark:text-yellow-400 mr-1 text-xs"></i><span class="hidden sm:inline">Emoji</span><span class="sm:hidden text-xs">😊</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-purple-50 hover:bg-purple-100 dark:bg-purple-900/70 dark:hover:bg-purple-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="显示节点类型">
                                        <input type="checkbox" id="append_type" name="append_type" checked class="mr-1 h-3 w-3">
                                        <i class="fas fa-tag text-purple-500 dark:text-purple-400 mr-1 text-xs"></i><span class="hidden sm:inline">节点类型</span><span class="sm:hidden text-xs">类型</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-green-50 hover:bg-green-100 dark:bg-green-900/70 dark:hover:bg-green-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="包含信息节点">
                                        <input type="checkbox" id="append_info" name="append_info" checked class="mr-1 h-3 w-3">
                                        <i class="fas fa-info-circle text-green-500 dark:text-green-400 mr-1 text-xs"></i><span class="hidden sm:inline">信息节点</span><span class="sm:hidden text-xs">信息</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-orange-50 hover:bg-orange-100 dark:bg-orange-900/70 dark:hover:bg-orange-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="跳过TLS验证">
                                        <input type="checkbox" id="scv" name="scv" class="mr-1 h-3 w-3">
                                        <i class="fas fa-shield-alt text-orange-500 dark:text-orange-400 mr-1 text-xs"></i><span class="hidden sm:inline">跳过TLS</span><span class="sm:hidden text-xs">TLS</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-900/70 dark:hover:bg-indigo-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="启用UDP">
                                        <input type="checkbox" id="udp" name="udp" class="mr-1 h-3 w-3">
                                        <i class="fas fa-broadcast-tower text-indigo-500 dark:text-indigo-400 mr-1 text-xs"></i><span>UDP</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-pink-50 hover:bg-pink-100 dark:bg-pink-900/70 dark:hover:bg-pink-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="Node List">
                                        <input type="checkbox" id="list" name="list" class="mr-1 h-3 w-3">
                                        <i class="fas fa-list text-pink-500 dark:text-pink-400 mr-1 text-xs"></i><span>List</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-teal-50 hover:bg-teal-100 dark:bg-teal-900/70 dark:hover:bg-teal-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="节点二次排序">
                                        <input type="checkbox" id="sort" name="sort" class="mr-1 h-3 w-3">
                                        <i class="fas fa-sort text-teal-500 dark:text-teal-400 mr-1 text-xs"></i><span class="hidden sm:inline">排序</span><span class="sm:hidden text-xs">排序</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-red-50 hover:bg-red-100 dark:bg-red-900/70 dark:hover:bg-red-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="过滤非法节点">
                                        <input type="checkbox" id="fdn" name="fdn" class="mr-1 h-3 w-3">
                                        <i class="fas fa-ban text-red-500 dark:text-red-400 mr-1 text-xs"></i><span class="hidden sm:inline">过滤</span><span class="sm:hidden text-xs">过滤</span>
                                    </label>
                                    <label class="flex items-center text-xs bg-cyan-50 hover:bg-cyan-100 dark:bg-cyan-900/70 dark:hover:bg-cyan-800/80 text-gray-700 dark:text-gray-200 px-1.5 sm:px-2 py-1 rounded cursor-pointer transition-colors relative tooltip-container" data-tooltip="插入insert_url">
                                        <input type="checkbox" id="insert" name="insert" class="mr-1 h-3 w-3">
                                        <i class="fas fa-plus-square text-cyan-500 dark:text-cyan-400 mr-1 text-xs"></i><span>Insert</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center space-x-3">
                                    <label for="config" class="form-label flex items-center mb-0">
                                        <i class="fas fa-cog text-green-500 dark:text-green-400 mr-2"></i>
                                        外部配置规则
                                    </label>
                                    <div class="flex items-center">
                                        <span class="text-xs text-gray-600 dark:text-gray-400 mr-2">自定义链接</span>
                                        <label class="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" id="customConfigToggle" class="sr-only peer">
                                            <div class="relative w-10 h-5 bg-gray-300 dark:bg-gray-600 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-green-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-600"></div>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div id="configSelectContainer" class="select-enhanced">
                                <select id="config" name="config"
                                    class="w-full px-3 sm:px-4 py-2 sm:py-3 pr-10 sm:pr-12 border-2 border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-medium transition-all duration-200 appearance-none cursor-pointer hover:border-gray-300 dark:hover:border-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 focus:bg-gray-50 dark:focus:bg-gray-700 text-sm sm:text-base">
                                </select>
                            </div>
                            <div id="customConfigContainer" class="hidden mt-3 animate-fade-in">
                                <input type="text" id="customConfig" name="customConfig" placeholder="输入自定义配置链接 (https://...)"
                                    class="w-full px-3 sm:px-4 py-2 sm:py-3 border-2 border-green-200 dark:border-green-700 rounded-xl bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-medium transition-all duration-200 hover:border-green-300 dark:hover:border-green-600 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 focus:bg-gray-50 dark:focus:bg-gray-700 text-sm sm:text-base">
                            </div>
                        </div>
                        
                        <!-- Filter Options -->
                        <div class="pt-4">
                            <h4 class="text-base sm:text-lg font-semibold text-gray-700 dark:text-gray-200 mb-3">节点过滤</h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                <div class="space-y-1">
                                    <label for="include" class="form-label flex items-center text-sm">
                                        <i class="fas fa-plus-circle text-green-500 dark:text-green-400 mr-2"></i>
                                        包含关键字
                                    </label>
                                    <input type="text" id="include" name="include"
                                        placeholder="节点名包含的关键字，支持正则"
                                        class="input-field hover:bg-gray-100 focus:bg-white text-sm">
                                </div>
                                <div class="space-y-1">
                                    <label for="exclude" class="form-label flex items-center text-sm">
                                        <i class="fas fa-minus-circle text-red-500 mr-2"></i>
                                        排除关键字
                                    </label>
                                    <input type="text" id="exclude" name="exclude"
                                        placeholder="节点名不包含的关键字，支持正则"
                                        class="input-field hover:bg-gray-100 focus:bg-white text-sm">
                                </div>
                                <div class="space-y-1 sm:col-span-2 lg:col-span-1">
                                    <label for="name" class="form-label flex items-center text-sm">
                                        <i class="fas fa-file-signature text-blue-500 mr-2"></i>
                                        转换文件名
                                    </label>
                                    <input type="text" id="name" name="name"
                                        placeholder="链接返回的订阅文件名"
                                        class="input-field hover:bg-gray-100 focus:bg-white text-sm">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="hidden sm:flex sm:flex-row gap-3 justify-center animate-slide-up" style="animation-delay: 0.2s">
                <!-- Desktop: Main Generate Button -->
                <button type="submit" id="generateBtn"
                    class="btn-primary px-6 py-3 text-base font-semibold pulse-glow flex-1 max-w-xs">
                    <i class="fas fa-magic mr-2 text-lg"></i>
                    生成新订阅链接
                </button>
                
                <!-- Desktop: Secondary Action Buttons -->
                <button type="button" id="importToClash"
                    class="btn-secondary px-6 py-3 text-base font-semibold flex-1 max-w-xs">
                    <i class="fas fa-download mr-2 text-lg"></i>
                    一键导入Clash
                </button>
                <button type="button" id="clashQrBtn"
                    class="btn-secondary px-6 py-3 text-base font-semibold flex-1 max-w-xs">
                    <i class="fas fa-qrcode mr-2 text-lg"></i>
                    Clash二维码
                </button>
            </div>
        </form>

        <!-- Result Section -->
        <div id="resultSection" class="mt-6 sm:mt-8 opacity-0 transform translate-y-4 transition-all duration-200 animate-scale-in" style="display: none;">
            <div class="card-glass border-green-200/50">
                <div class="card-body">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 space-y-3 sm:space-y-0">
                        <div class="flex items-center">
                            <div class="bg-green-100 p-2 sm:p-3 rounded-xl mr-3 sm:mr-4">
                                <i class="fas fa-check-circle text-green-600 text-lg sm:text-xl"></i>
                            </div>
                            <div class="flex items-center">
                                <h3 class="text-lg sm:text-xl font-bold gradient-text">转换完成</h3>
                                <span class="badge badge-primary ml-2 sm:ml-3 text-xs sm:text-sm">成功</span>
                            </div>

            border-top-color: rgba(0, 0, 0, 0.9);
